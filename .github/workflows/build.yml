name: Build FFmpeg

on:
  workflow_dispatch:  # 手动触发

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Dependencies
        run: sudo apt update && sudo apt install -y yasm nasm
      
      - name: Build
        run: |
          ./configure --enable-gpl --enable-shared
          make -j$(nproc)
      
      - name: Package
        run: |
          mkdir -p release
          cp ffmpeg ffprobe libavcodec/*.so* libavformat/*.so* libavutil/*.so* release/
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-linux-x64
          path: release/
